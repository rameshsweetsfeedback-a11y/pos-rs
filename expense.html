<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Expense | Sweet Shop POS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500;700&family=Manrope:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="transfer-layout">
      <section class="panel transfer-shell">
        <div class="section-header">
          <div>
            <p class="eyebrow">Expense</p>
            <h1>Expense Register</h1>
          </div>
          <a class="ghost-button transfer-link" href="index.html">Back To POS</a>
        </div>
        <p class="muted">Track shop expenses separately from sales.</p>

        <div class="grid two">
          <label>
            Filter By Date
            <input id="expenseDateFilter" type="date" />
          </label>
          <div class="receipt-actions expense-actions expense-filter-actions">
            <button id="clearExpenseDateFilter" class="ghost-button" type="button">Clear Filter</button>
          </div>
        </div>

        <form id="expenseForm" class="stack">
          <div class="grid two">
            <label>
              Expense Name
              <input id="expenseTitle" type="text" placeholder="Milk purchase" required />
            </label>
            <label>
              Amount
              <input id="expenseAmount" type="number" min="0.01" step="0.01" placeholder="0.00" required />
            </label>
          </div>
          <label>
            Notes
            <input id="expenseNotes" type="text" placeholder="Optional notes" />
          </label>
          <div class="receipt-actions expense-actions">
            <button class="button accent" type="submit">Add Expense</button>
          </div>
        </form>

        <div id="expenseSummary" class="summary transfer-summary"></div>
        <div id="expenseList" class="history-list transfer-page-list"></div>
      </section>
    </div>

    <script src="db.js"></script>
    <script src="expense.js"></script>
  </body>
</html>
