<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Low Stock | Sweet Shop POS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500;700&family=Manrope:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="transfer-layout">
      <section class="panel transfer-shell">
        <div class="section-header">
          <div>
            <p class="eyebrow">Low Stock</p>
            <h1>Low Stock Items</h1>
          </div>
          <a class="ghost-button transfer-link" href="index.html">Back To Dashboard</a>
        </div>
        <p class="muted">Items listed here are at or below their minimum stock limit.</p>
        <div id="lowStockSummary" class="summary transfer-summary"></div>
        <div id="lowStockPageList" class="history-list transfer-page-list"></div>
      </section>
    </div>

    <script src="db.js"></script>
    <script src="low-stock.js"></script>
  </body>
</html>
